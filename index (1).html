<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Engineering — MCQ Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.13);
    --accent: #2563eb;
    --accent2: #7c3aed;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --green-text: #15803d;
    --red: #dc2626;
    --red-bg: #fff1f2;
    --red-border: #fecdd3;
    --red-text: #b91c1c;
    --text: #1a1a2e;
    --muted: #6b7280;
    --l1: #2563eb;
    --l2: #7c3aed;
    --l3: #0891b2;
    --l4: #d97706;
    --l5: #db2777;
    --l6: #059669;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 40% at 10% 0%, rgba(37,99,235,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 90% 100%, rgba(124,58,237,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 2;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    text-align: center;
    padding: 3rem 1rem 2.2rem;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 100px;
    padding: 5px 18px;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 1.1rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 500;
  }

  .header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
    font-family: 'Tajawal', sans-serif;
  }

  /* Scoreboard */
  .scoreboard {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }

  .score-stats {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
  }

  .stat-num.blue { color: var(--accent); }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }

  .progress-wrap {
    flex: 1;
    max-width: 280px;
  }

  .progress-bar {
    height: 7px;
    background: #e5e7eb;
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
    font-family: 'Tajawal', sans-serif;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: #fca5a5;
    color: var(--red);
    background: var(--red-bg);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }

  /* Lecture section */
  .lecture-section { margin-bottom: 2.5rem; }

  .lecture-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding-bottom: 0.7rem;
    border-bottom: 2px solid var(--border);
  }

  .lecture-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .lecture-name {
    font-size: 17px;
    font-weight: 700;
  }

  .lecture-count {
    margin-right: auto;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 100px;
    font-family: 'Tajawal', sans-serif;
  }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .q-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .q-card.answered-correct {
    border-color: #86efac;
    background: #f0fdf4;
  }

  .q-card.answered-wrong {
    border-color: #fca5a5;
    background: #fff5f5;
  }

  .q-num {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    font-family: 'Tajawal', sans-serif;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
    .score-stats { gap: 0.8rem; }
    .stat-num { font-size: 16px; }
    .scoreboard { padding: 0.7rem 1rem; }
  }

  .opt-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13.5px;
    font-family: 'Cairo', sans-serif;
    color: #374151;
    cursor: pointer;
    text-align: right;
    transition: all 0.15s;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .opt-label {
    background: rgba(0,0,0,0.06);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--muted);
    margin-top: 1px;
  }

  .opt-btn:hover:not(:disabled) {
    background: #eff6ff;
    border-color: #93c5fd;
    color: var(--accent);
  }

  .opt-btn:hover:not(:disabled) .opt-label {
    background: #dbeafe;
    color: var(--accent);
  }

  .opt-btn:disabled { cursor: default; }

  .opt-btn.correct {
    background: var(--green-bg);
    border-color: #4ade80;
    color: var(--green-text);
  }

  .opt-btn.correct .opt-label {
    background: #dcfce7;
    color: var(--green-text);
  }

  .opt-btn.wrong {
    background: var(--red-bg);
    border-color: #f87171;
    color: var(--red-text);
  }

  .opt-btn.wrong .opt-label {
    background: #fee2e2;
    color: var(--red-text);
  }

  .feedback {
    margin-top: 10px;
    font-size: 13.5px;
    padding: 9px 14px;
    border-radius: 9px;
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 500;
    line-height: 1.5;
  }

  .feedback.ok {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    color: var(--green-text);
    display: flex;
  }

  .feedback.no {
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    color: var(--red-text);
    display: flex;
  }

  .fb-icon { font-size: 15px; flex-shrink: 0; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    font-family: 'Tajawal', sans-serif;
    background: var(--surface);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-card { animation: fadeUp 0.25s ease both; }

  @keyframes pop-green {
    0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }

  .opt-btn.correct { animation: pop-green 0.45s ease-out; }
</style>
</head>

<header class="header">
  <div class="header-badge">📚 Software Engineering</div>
  <h1>MCQ <span>Question Bank</span></h1>

</div>

<div class="content" id="content"></div>

<footer class="footer">Software Engineering MCQ Bank &nbsp;·&nbsp; Lectures 1–6 &nbsp;·&nbsp; 100 سؤال</footer>

let answered = 0, correct = 0, wrong = 0;

function updateStats() {
  document.getElementById('s-answered').textContent = answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = answered + ' / ' + questions.length;
}

function build() {
  const container = document.getElementById('content');
  container.innerHTML = '';
  answered = 0; correct = 0; wrong = 0;
  updateStats();

  const groups = {};
  questions.forEach((q, i) => {
    if (!groups[q.l]) groups[q.l] = [];
    groups[q.l].push({...q, idx: i});
  });

  Object.entries(groups).forEach(([lecture, qs]) => {
    const section = document.createElement('div');
    section.className = 'lecture-section';
    const color = LECTURE_COLORS[lecture] || '#888';

    const header = document.createElement('div');
    header.className = 'lecture-header';
    header.innerHTML = `
      <div class="lecture-dot" style="background:${color}"></div>
      <span class="lecture-name" style="color:${color}">${lecture}</span>
      <span class="lecture-count">${qs.length} سؤال</span>
    `;
    section.appendChild(header);

    qs.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.style.animationDelay = (qi * 0.015) + 's';
      card.id = 'card-' + q.idx;

      const optsHtml = q.opts.map((opt, oi) => `
        <button class="opt-btn" onclick="answer(${q.idx},${oi},this)" id="opt-${q.idx}-${oi}">
          <span class="opt-label">${LABELS[oi]}</span>
          <span>${opt}</span>
        </button>
      `).join('');

      card.innerHTML = `
        <div class="q-num">سؤال ${q.idx + 1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optsHtml}</div>
        <div class="feedback" id="fb-${q.idx}"></div>
      `;
      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

function answer(qIdx, chosen, btn) {
  const q = questions[qIdx];
  const card = document.getElementById('card-' + qIdx);
  const fb = document.getElementById('fb-' + qIdx);

  for (let i = 0; i < 4; i++) {
    const b = document.getElementById('opt-' + qIdx + '-' + i);
    if (b) b.disabled = true;
  }

  answered++;

  if (chosen === q.a) {
    btn.classList.add('correct');
    card.classList.add('answered-correct');
    correct++;
    fb.className = 'feedback ok';
    fb.innerHTML = '<span class="fb-icon">✓</span> إجابة صحيحة!';
  } else {
    btn.classList.add('wrong');
    card.classList.add('answered-wrong');
    wrong++;
    const correctBtn = document.getElementById('opt-' + qIdx + '-' + q.a);
    if (correctBtn) correctBtn.classList.add('correct');
    fb.className = 'feedback no';
    fb.innerHTML = '<span class="fb-icon">✗</span> غلط — الإجابة الصح: <strong>' + LABELS[q.a] + ') ' + q.opts[q.a] + '</strong>';
  }

  updateStats();
}

function resetAll() {
  if (confirm('إعادة تعيين كل الإجابات؟')) build();
}

build();
</script>
